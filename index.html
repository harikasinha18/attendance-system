<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Attendance Eligibility System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            transition: 0.4s;
        }
        
        body.dark {
            background: linear-gradient(135deg, #111, #222);
        }
        
        .container {
            width: 95%;
            max-width: 1200px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        body.dark .container {
            background: #2d2d2d;
            color: white;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2a5298;
        }
        
        body.dark h1 {
            color: #4da3ff;
        }
        
        .top-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.3s;
        }
        
        .generate-btn {
            background: #2ecc71;
            color: white;
        }
        
        .generate-btn:hover {
            background: #27ae60;
        }
        
        .toggle-btn {
            background: #3498db;
            color: white;
        }
        
        .toggle-btn:hover {
            background: #2980b9;
        }
        
        .dark-btn {
            background: #333;
            color: white;
        }
        
        .dark-btn:hover {
            background: black;
        }
        
        .download-btn {
            background: #e67e22;
            color: white;
        }
        
        .download-btn:hover {
            background: #ca6f1e;
        }
        
        input {
            padding: 12px;
            width: 250px;
            border-radius: 10px;
            border: 1px solid #ccc;
            outline: none;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 15px;
            animation: fadeIn 0.5s ease;
        }
        
        th {
            background: #2a5298;
            color: white;
            padding: 15px;
        }
        
        td {
            padding: 15px;
            text-align: center;
            background: #f9f9f9;
        }
        
        body.dark td {
            background: #444;
            color: white;
        }
        
        tr:nth-child(even) td {
            background: #eeeeee;
        }
        
        body.dark tr:nth-child(even) td {
            background: #555;
        }
        
        tr:hover td {
            background: #d6eaf8;
        }
        
        body.dark tr:hover td {
            background: #666;
        }
        
        img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #3498db;
        }
        
        .eligible {
            color: green;
            font-weight: bold;
        }
        
        .not-eligible {
            color: red;
            font-weight: bold;
        }
        
        .progress-container {
            width: 100%;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 20px;
            color: white;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
        }
        
        .green {
            background: #2ecc71;
        }
        
        .red {
            background: #e74c3c;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media(max-width:768px) {
            table {
                font-size: 12px;
            }
            input {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🎓 Advanced Attendance Eligibility System</h1>

        <div class="top-controls">

            <button class="generate-btn" onclick="createTable()">
                Generate Table
            </button>

            <button class="toggle-btn" onclick="toggleTable()">
                Show / Hide Table
            </button>

            <button class="dark-btn" onclick="toggleDarkMode()">
                Dark Mode
            </button>

            <button class="download-btn" onclick="downloadTable()">
                Download Report
            </button>

            <input type="text" id="searchInput" placeholder="Search Student..." onkeyup="searchStudent()">

        </div>

        <div id="table-container"></div>

    </div>

    <script>
        function createTable() {

            let rows;

            while (true) {

                rows = prompt("Enter number of students (1-20)");

                if (!rows || isNaN(rows) || rows < 1 || rows > 20) {

                    alert("Enter valid number between 1 and 20");

                } else {

                    rows = parseInt(rows);
                    break;
                }
            }

            let table = `
            <table id="student-table">
                <thead>
                    <tr>
                        <th>Photo</th>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Attendance</th>
                        <th>Progress</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
            `;

            for (let i = 1; i <= rows; i++) {

                let name = prompt(`Enter student ${i} name`);

                let roll = prompt(`Enter ${name}'s roll number`);

                let attendance;

                while (true) {

                    attendance = prompt(`Enter attendance % of ${name}`);

                    if (!attendance ||
                        isNaN(attendance) ||
                        attendance < 0 ||
                        attendance > 100
                    ) {

                        alert("Enter valid attendance 0-100");

                    } else {

                        attendance = parseFloat(attendance);
                        break;
                    }
                }

                let image = `https://ui-avatars.com/api/?name=${name}&background=random`;

                let status =
                    attendance >= 75 ?
                    `<span class="eligible">Eligible</span>` :
                    `<span class="not-eligible">Not Eligible</span>`;

                let progressColor =
                    attendance >= 75 ? "green" : "red";

                table += `
                <tr>
                    <td>
                        <img src="${image}">
                    </td>

                    <td>${name}</td>

                    <td>${roll}</td>

                    <td>${attendance}%</td>

                    <td>
                        <div class="progress-container">
                            <div class="progress-bar ${progressColor}"
                                style="width:${attendance}%">
                                ${attendance}%
                            </div>
                        </div>
                    </td>

                    <td>${status}</td>
                </tr>
                `;
            }

            table += `
                </tbody>
            </table>
            `;

            document.getElementById("table-container").innerHTML = table;

            saveData();
        }

        function toggleTable() {

            let table = document.getElementById("student-table");

            if (table) {

                table.style.display =
                    table.style.display === "none" ?
                    "table" :
                    "none";
            }
        }

        function toggleDarkMode() {

            document.body.classList.toggle("dark");
        }

        function searchStudent() {

            let input =
                document.getElementById("searchInput")
                .value.toLowerCase();

            let rows =
                document.querySelectorAll("#student-table tbody tr");

            rows.forEach(row => {

                let name =
                    row.cells[1].textContent.toLowerCase();

                row.style.display =
                    name.includes(input) ?
                    "" :
                    "none";
            });
        }

        function downloadTable() {

            let table =
                document.getElementById("student-table");

            if (!table) {

                alert("Generate table first!");
                return;
            }

            let html = table.outerHTML;

            let blob = new Blob([html], {
                type: "text/html"
            });

            let a = document.createElement("a");

            a.href = URL.createObjectURL(blob);

            a.download = "attendance_report.html";

            a.click();
        }

        function saveData() {

            let table =
                document.getElementById("table-container")
                .innerHTML;

            localStorage.setItem("attendanceTable", table);
        }

        window.onload = function() {

            let saved =
                localStorage.getItem("attendanceTable");

            if (saved) {

                document.getElementById(
                    "table-container"
                ).innerHTML = saved;
            }
        };
    </script>

</body>

</html>
